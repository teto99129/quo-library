services:
  quo-library:
    build: 
      context: .
      dockerfile: ./Dockerfile
    tty: true
    working_dir: /app
    volumes:
      - ~/.config/nvim:/home/ubuntu/.config/nvim
      - /opt/nvim-linux-x86_64:/opt/nvim-linux-x86_64
      - ~/.local/share:/home/ubuntu/.local/share
      - ~/.cache/nvim:/home/ubuntu/.cache/nvim
      - .:/app
      - ~/.local/bin:/home/ubuntu/.local/bin
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/mydb
    depends_on:
      - db

  db:
    image: postgres:18.4-alpine3.23
    container_name: postgres
    ports:
      - 5432:5432
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: postgres


